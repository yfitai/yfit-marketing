<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />

    <!-- Primary Meta -->
    <title>YFIT AI — AI-Powered Personal Fitness &amp; Nutrition Coach</title>
    <meta name="description" content="YFIT AI is your personal AI fitness coach. Get real-time workout form analysis, personalized nutrition tracking, medication management, and daily AI coaching — all in one app." />
    <meta name="keywords" content="AI fitness coach, workout form analysis, nutrition tracking, medication tracking, personal trainer app, YFIT AI" />
    <meta name="author" content="YFIT AI" />
    <link rel="canonical" href="https://yfitai.com" />

    <!-- Open Graph (Facebook, LinkedIn, WhatsApp) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://yfitai.com" />
    <meta property="og:title" content="YFIT AI — AI-Powered Personal Fitness &amp; Nutrition Coach" />
    <meta property="og:description" content="Real-time AI form analysis, personalized nutrition tracking, medication management, and daily coaching. Your complete fitness companion." />
    <meta property="og:image" content="https://yfitai.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="YFIT AI" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@yfitai" />
    <meta name="twitter:title" content="YFIT AI — AI-Powered Personal Fitness &amp; Nutrition Coach" />
    <meta name="twitter:description" content="Real-time AI form analysis, personalized nutrition tracking, medication management, and daily coaching. Your complete fitness companion." />
    <meta name="twitter:image" content="https://yfitai.com/og-image.png" />

    <!-- JSON-LD Structured Data (schema.org SoftwareApplication) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "YFIT AI",
      "description": "AI-powered personal fitness and nutrition coach with real-time form analysis, medication tracking, and personalized workout plans.",
      "url": "https://yfitai.com",
      "applicationCategory": "HealthApplication",
      "operatingSystem": "Web, iOS, Android",
      "offers": [
        {
          "@type": "Offer",
          "name": "Free Basic",
          "price": "0",
          "priceCurrency": "USD"
        },
        {
          "@type": "Offer",
          "name": "Pro Monthly",
          "price": "12.99",
          "priceCurrency": "USD",
          "billingIncrement": "P1M"
        },
        {
          "@type": "Offer",
          "name": "Pro Yearly",
          "price": "99.99",
          "priceCurrency": "USD",
          "billingIncrement": "P1Y"
        },
        {
          "@type": "Offer",
          "name": "Pro Lifetime",
          "price": "249.99",
          "priceCurrency": "USD"
        }
      ],
      "publisher": {
        "@type": "Organization",
        "name": "YFIT AI",
        "url": "https://yfitai.com",
        "email": "support@yfitai.com"
      },
      "featureList": [
        "AI workout form analysis",
        "Personalized nutrition tracking",
        "Barcode food scanner",
        "Medication tracking with interaction alerts",
        "Daily AI coaching",
        "Progress predictions"
      ]
    }
    </script>

    <!-- FAQ Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is YFIT AI?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "YFIT AI is an AI-powered personal fitness and nutrition coaching app. It provides real-time workout form analysis, personalized meal plans, medication tracking, and daily AI coaching — all in one place."
          }
        },
        {
          "@type": "Question",
          "name": "Do I need a gym membership or equipment?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No. YFIT AI works for home, gym, and outdoor workouts. The AI adapts your plan based on what equipment you have available — including no equipment at all."
          }
        },
        {
          "@type": "Question",
          "name": "How much does YFIT AI cost?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "YFIT AI offers a Free Basic plan (no credit card required), Pro Monthly at $12.99/month, Pro Yearly at $99.99/year (Best Value), and Pro Lifetime at $249.99 (Most Popular). There is also a limited-time offer of 1 free month of Pro."
          }
        },
        {
          "@type": "Question",
          "name": "Is my health data safe with YFIT AI?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. All data is encrypted with AES-256 in transit and at rest. YFIT AI never sells your personal data to third parties. You can request full account deletion at any time."
          }
        }
      ]
    }
    </script>

    <!-- Pinterest Domain Verification -->
    <meta name="p:domain_verify" content="4d0481753bd624512296ff2aa81f3f33"/>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"></script>
  </body>

</html>
